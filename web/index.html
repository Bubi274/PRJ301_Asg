<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống - AptManage</title>
    <!-- Importing Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0052b4;
            --primary-hover: #004191;
            --primary-light: rgba(0, 82, 180, 0.08);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --bg-gradient-start: #f1f6fc;
            --bg-gradient-end: #e2eefc;
            --border-color: #e2e8f0;
            --border-focus: #0052b4;
            --card-shadow: 0 20px 40px rgba(0, 82, 180, 0.06), 0 1px 3px rgba(0, 0, 0, 0.02);
            --transition-speed: 0.25s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Container & Animations */
        .login-wrapper {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Branding Section */
        .brand-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 68px;
            height: 68px;
            background-color: var(--primary-color);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 82, 180, 0.2);
            margin-bottom: 16px;
            color: #ffffff;
            transition: transform 0.3s ease;
        }

        .brand-icon:hover {
            transform: scale(1.05);
        }

        .brand-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary-color);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.2px;
        }

        /* Card container */
        .login-card {
            width: 100%;
            background-color: #ffffff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 32px;
        }

        /* Input Controls styling */
        .form-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            pointer-events: none;
            transition: color var(--transition-speed) ease;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-dark);
            background-color: #ffffff;
            outline: none;
            transition: all var(--transition-speed) ease;
        }

        .form-input::placeholder {
            color: var(--text-light);
            font-weight: 400;
        }

        .form-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .form-input:focus + .input-icon {
            color: var(--primary-color);
        }

        /* Eye Icon (Show/Hide Password) */
        .password-toggle {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: var(--text-light);
            display: flex;
            align-items: center;
            background: none;
            border: none;
            padding: 0;
            transition: color var(--transition-speed) ease;
        }

        .password-toggle:hover {
            color: var(--text-muted);
        }

        /* Forgot Password Section */
        .forgot-password-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 28px;
        }

        .forgot-password-link {
            font-size: 13.5px;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            transition: color var(--transition-speed) ease;
        }

        .forgot-password-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* Submit Button Styling */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition-speed) cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 12px rgba(0, 82, 180, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 6px 16px rgba(0, 82, 180, 0.25);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(0, 82, 180, 0.15);
        }

        /* Divider section */
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: var(--text-light);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
        }

        .divider::before {
            margin-right: 16px;
        }

        .divider::after {
            margin-left: 16px;
        }

        /* Signup Promo Link */
        .signup-promo {
            text-align: center;
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .signup-link {
            color: var(--primary-color);
            font-weight: 700;
            text-decoration: none;
            margin-left: 4px;
            transition: color var(--transition-speed) ease;
        }

        .signup-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* Footer styling */
        .footer {
            margin-top: 36px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            font-weight: 500;
        }

        /* Custom alert/toast for interactive preview */
        .toast {
            position: fixed;
            bottom: 24px;
            background-color: #0f172a;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <!-- Brand Section -->
        <div class="brand-section">
            <div class="brand-icon">
                <!-- Premium Custom Building Outline SVG -->
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                    <path d="M9 22V17h6v5"></path>
                    <path d="M8 6h2"></path>
                    <path d="M14 6h2"></path>
                    <path d="M8 10h2"></path>
                    <path d="M14 10h2"></path>
                    <path d="M8 14h2"></path>
                    <path d="M14 14h2"></path>
                </svg>
            </div>
            <h1 class="brand-title">AptManage</h1>
            <p class="brand-subtitle">Quản lý chung cư thông minh</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h2 class="card-title">Đăng nhập hệ thống</h2>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- Username Input -->
                <div class="form-group">
                    <label class="form-label" for="username">Tài khoản:</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <!-- User SVG Icon -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </span>
                        <input class="form-input" type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autocomplete="username">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="form-group">
                    <label class="form-label" for="password">Mật khẩu:</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <!-- Lock SVG Icon -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <input class="form-input" type="password" id="password" name="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility()" aria-label="Hiển thị mật khẩu">
                            <!-- Eye SVG Icon (Visible by default) -->
                            <svg id="eyeOpenIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <!-- Eye Off SVG Icon (Hidden by default) -->
                            <svg id="eyeCloseIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Forgot Password -->
                <div class="forgot-password-container">
                    <a href="#" class="forgot-password-link" onclick="showToast('Chức năng Quên mật khẩu đang được phát triển!')">Quên mật khẩu?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">Đăng nhập</button>
            </form>

            <div class="divider">Hoặc</div>

            <!-- Signup Promotion -->
            <div class="signup-promo">
                Chưa có tài khoản? <a href="#" class="signup-link" onclick="showToast('Chức năng Đăng ký tài khoản đang được phát triển!')">Đăng ký tài khoản mới</a>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            © 2024 AptManage. Version 1.0.4
        </footer>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast" class="toast">Thông báo</div>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeOpenIcon = document.getElementById('eyeOpenIcon');
            const eyeCloseIcon = document.getElementById('eyeCloseIcon');
            const toggleButton = document.querySelector('.password-toggle');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpenIcon.style.display = 'none';
                eyeCloseIcon.style.display = 'block';
                toggleButton.setAttribute('aria-label', 'Ẩn mật khẩu');
            } else {
                passwordInput.type = 'password';
                eyeOpenIcon.style.display = 'block';
                eyeCloseIcon.style.display = 'none';
                toggleButton.setAttribute('aria-label', 'Hiển thị mật khẩu');
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            showToast(`Đăng nhập thành công với tài khoản: ${username}`);
            // In a real J2EE environment, we might submit this form to a controller/servlet
            // document.getElementById('loginForm').submit();
        }

        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
